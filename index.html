<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <nav class="nav">
            <a href="index.html" class="logo">Workplanning</a>
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <ul class="menu">
                <li><a href="equipo.html">Team</a></li>
                <li><a href="vacaciones.html" class="menu-notif">Requests</a></li>
                <li><a href="hire.html">Hire</a></li>
                <li><a href=new-project.html class="button">New project</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="display-none">Workplanning index</h1>
        <div class="calendar-container">
            <div id="calendar"></div>
        </div>
    </main>

    <footer class="footer">
        <p>Created with love</p>
        <ul>
            <li><a href=""><i class="fa-regular fa-envelope icono-footer"></i></a></li>
            <li><a href=""><i class="fa-solid fa-mobile-screen icono-footer"></i></a></li>
            <li><a href="https://www.linkedin.com/"><i class="fa-brands fa-linkedin icono-footer"></i></a></li>
        </ul>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const calendarEl = document.getElementById('calendar');

            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                height: '100%',
                expandRows: true,
                selectable: true,
                editable: true,

                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },

                buttonText: {
                    today: 'Today',
                    month: 'Month',
                    week: 'Week',
                    day: 'Day'
                },

                // Eventos iniciales de ejemplo
                events: [
                    {
                        title: 'Project Kickoff',
                        start: new Date().toISOString().split('T')[0]
                    },
                    {
                        title: 'Design Review',
                        start: '2026-03-10'
                    }
                ],

                // Cuando haces click en un día
                dateClick: function (info) {
                    const title = prompt("Enter event title:");

                    if (title) {
                        calendar.addEvent({
                            title: title,
                            start: info.dateStr,
                            allDay: true
                        });
                    }
                },

                // Cuando haces click en un evento
                eventClick: function (info) {
                    if (confirm("Delete this event?")) {
                        info.event.remove();
                    }
                }
            });

            calendar.render();
        });
    </script>
</body>

</html>
